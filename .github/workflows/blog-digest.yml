name: Weekly Blog Digest

# Sends ONE email listing all posts published in the last 7 days.
# Separate channel from the lead form — requires repo secret: RESEND_API_KEY
on:
  schedule:
    - cron: '0 14 * * 5'   # Friday 14:00 UTC, after the Friday post
  workflow_dispatch: {}

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Send weekly digest
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python automation/notify.py --weekly
