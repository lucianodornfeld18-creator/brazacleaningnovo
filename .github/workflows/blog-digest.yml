name: Weekly Blog Digest
on:
  schedule:
    - cron: '0 14 * * 5'   # sexta 14:00 UTC
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Send weekly digest
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python automation/notify.py --weekly
