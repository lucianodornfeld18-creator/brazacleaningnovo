name: Auto Blog Post
on:
  schedule:
    - cron: '0 13 * * 1,3'   # seg/qua 13:00 UTC (~9h FL) - 2x/semana, custo <= $1/semana
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: blog-post
  cancel-in-progress: false
jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install anthropic
      - name: Generate, validate, build, update site
        id: gen
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python automation/agent_run.py
      - name: Log published post
        if: success() && steps.gen.outputs.slug != ''
        run: python automation/notify.py --log "${{ steps.gen.outputs.slug }}" || true
      - name: Commit & push
        run: |
          git config user.name "braza-bot"
          git config user.email "website@brazacleaning.com"
          git add -A
          git diff --cached --quiet || git commit -m "Blog: auto post (cron)"
          git push
